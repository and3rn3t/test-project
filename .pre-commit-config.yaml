# For Python projects (delete if using Node — husky + commitlint cover commit hygiene there).
# Setup: pip install pre-commit && pre-commit install --hook-type commit-msg
repos:
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: []
