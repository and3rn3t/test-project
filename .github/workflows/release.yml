# Release workflow — creates a GitHub Release when a version tag is pushed.
#
# Usage:
#   git tag v1.0.0
#   git push origin v1.0.0
#
# TODO: Customize the release body, add build artifacts, or enable publishing
# to a package registry (see commented-out sections below).

name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          # TODO: Uncomment to attach build artifacts
