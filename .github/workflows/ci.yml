# Default: Node.js quality pipeline (matches and3rn3t repo conventions).
# Python variant at the bottom — swap the jobs if this is a Python project.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Lint, Type-check & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm # switch to pnpm for pnpm repos (also swap install below)
      - name: Install dependencies
        run: npm ci
        env:
          HUSKY: 0
      - name: Lint
        run: npm run lint
      - name: Type check
        run: npm run type-check
      - name: Format check
        run: npm run format:check
      - name: Tests with coverage
        run: npm test
      - name: Build
        run: npm run build

