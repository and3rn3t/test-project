# TODO: Customize this CI workflow for your project.
# This template assumes Node.js — see comments for adapting to other languages.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # --- Node.js setup ---
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          # cache: npm  # TODO: Uncomment to enable dependency caching

