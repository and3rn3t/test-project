# Dependabot configuration
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Keep GitHub Actions up to date
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  # Keep npm dependencies up to date
  # TODO: Replace with your project's package ecosystem:
  #   pip (Python), cargo (Rust), gomod (Go), maven (Java),
  #   nuget (.NET), bundler (Ruby), composer (PHP), etc.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    # TODO: Uncomment to limit the number of open PRs
    # open-pull-requests-limit: 10
    # TODO: Uncomment to group minor/patch updates into a single PR
    # groups:
    #   minor-and-patch:
    #     update-types:
    #       - minor
    #       - patch
